name: Daily News Crawl & Deploy

on:
  schedule:
    - cron: '20 0 * * *'   # 매일 UTC 00:20 (KST 09:20)
    - cron: '0  5 * * *'   # 매일 UTC 05:00 (KST 14:00)
    - cron: '0  8 * * *'   # 매일 UTC 08:00 (KST 17:00)
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'crawler.py'
      - 'index.html'
      - 'app.js'
      - 'requirements.txt'

concurrency:
  group: crawl-deploy
  cancel-in-progress: false

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 크롤러 실행 (최대 3회 재시도) ──
      - name: Run crawler (attempt 1)
        id: crawl1
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python crawler.py

      - name: Run crawler (attempt 2)
        id: crawl2
        if: steps.crawl1.outcome == 'failure'
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "⏳ Retry 2/3 — waiting 30s..."
          sleep 30
          python crawler.py

      - name: Run crawler (attempt 3)
        id: crawl3
        if: steps.crawl2.outcome == 'failure'
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "⏳ Retry 3/3 — waiting 60s..."
          sleep 60
          python crawler.py

      - name: Crawl result summary
        if: always()
        run: |
          echo "=== Crawler Results ==="
          echo "Attempt 1: ${{ steps.crawl1.outcome }}"
          echo "Attempt 2: ${{ steps.crawl2.outcome || 'skipped' }}"
          echo "Attempt 3: ${{ steps.crawl3.outcome || 'skipped' }}"
          if [[ "${{ steps.crawl1.outcome }}" == "failure" && \
                "${{ steps.crawl2.outcome }}" == "failure" && \
                "${{ steps.crawl3.outcome }}" == "failure" ]]; then
            echo "⚠️ All 3 attempts failed — keeping existing data.json"
          fi

      # ── 커밋 & 푸시 (충돌 완전 방지: fetch→reset→commit→force-with-lease) ──
      - name: Commit & push data.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp data.json /tmp/data.json.bak

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            cp /tmp/data.json.bak data.json
            git add data.json

            if git diff --cached --quiet; then
              echo "✅ No changes in data.json — skipping commit"
              exit 0
            fi

            git commit -m "chore: update news data $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            if git push --force-with-lease origin main; then
              echo "✅ Push 성공"
              exit 0
            fi

            echo "⏳ Push 실패 — 재시도 ($attempt/3)..."
            sleep 5
          done

          echo "❌ Push 3회 실패" && exit 1

      # ── Cloudflare Pages 배포 ──
      - name: Deploy to Cloudflare Pages
        if: always()
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          wrangler pages deploy . --project-name=ai-dailyk --branch=main --commit-dirty=true
